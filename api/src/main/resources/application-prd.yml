spring:
  config:
    activate:
      on-profile: prd

  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/satellite-tracker-db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

orekit:
  data:
    path: /app/orekit-data

spacetrack:
  identity: ${SPACETRACK_IDENTITY}
  password: ${SPACETRACK_PASSWORD}

logging:
  level:
    space.satellite.websocket: INFO

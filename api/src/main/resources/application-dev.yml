spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/satellite-tracker-db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false #true
    properties:
      hibernate:
        format_sql: false #true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

orekit:
  data:
    path: ${OREKIT_DATA_PATH}

# Space-Track credentials (set via env vars)
spacetrack:
  identity: ${SPACETRACK_IDENTITY:}
  password: ${SPACETRACK_PASSWORD:}

logging:
  level:
    space.satellite.websocket: DEBUG

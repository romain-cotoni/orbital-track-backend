services:

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: satellite-tracker-db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d satellite-tracker-db"]
      interval: 10s
      timeout: 5s
      retries: 5

  batch:
    build:
      context: .
      dockerfile: batch/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-prd}
      DB_URL: jdbc:postgresql://postgres:5432/satellite-tracker-db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPACETRACK_IDENTITY: ${SPACETRACK_IDENTITY}
      SPACETRACK_PASSWORD: ${SPACETRACK_PASSWORD}
      OREKIT_DATA_PATH: /app/orekit-data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-prd}
      DB_URL: jdbc:postgresql://postgres:5432/satellite-tracker-db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPACETRACK_IDENTITY: ${SPACETRACK_IDENTITY}
      SPACETRACK_PASSWORD: ${SPACETRACK_PASSWORD}
      OREKIT_DATA_PATH: /app/orekit-data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ${ANGULAR_PROJECT_PATH}
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres-data:

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/satellite-tracker-db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false #true
    properties:
      hibernate:
        format_sql: false #true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  batch:
    jdbc:
      initialize-schema: always

# Space-Track credentials — set SPACETRACK_IDENTITY and SPACETRACK_PASSWORD env vars
spacetrack:
  identity: ${SPACETRACK_IDENTITY}
  password: ${SPACETRACK_PASSWORD}

# Override for dev: fast staggered crons (every 5 minutes, offset by 1 min per regime)
sattrack:
  batch:
    leo:
      group: ""                # fetch all object types (payload, debris, rocket body)
      orbit-type: "LEO"
      epoch-window: "24h"
      exclude-decayed: true
      cleanup-threshold-days: 7
      chunk-size: 500
      cron: "0 0/5 * * * *"   # every 5 min
      retry-delay-ms: 5000     # 5 seconds between retries (dev)
    meo:
      group: ""
      orbit-type: "MEO"
      epoch-window: "30d"
      exclude-decayed: true
      cleanup-threshold-days: 35
      chunk-size: 500
      cron: "0 1/5 * * * *"   # every 5 min, offset 1 min
      retry-delay-ms: 5000
    heo:
      group: ""
      orbit-type: "HEO"
      epoch-window: "72h"
      exclude-decayed: true
      cleanup-threshold-days: 14
      chunk-size: 500
      cron: "0 2/5 * * * *"   # every 5 min, offset 2 min
      retry-delay-ms: 5000
    geo:
      group: ""
      orbit-type: ""
      epoch-window: "180d"
      exclude-decayed: true
      cleanup-threshold-days: 60
      chunk-size: 500
      cron: "0 3/5 * * * *"   # every 5 min, offset 3 min
      retry-delay-ms: 5000
